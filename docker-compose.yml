services:
  nginx:
    image: nginx:alpine
    container_name: gridlock_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: gridlock_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: gridlock_backend
    ports:
      - "8000:8000"
    volumes:
      - ./public/dataset.csv:/app/public/dataset.csv
    environment:
      - PORT=8000
      - LOVABLE_API_KEY
      - GEMINI_API_KEY
      - OPENAI_API_KEY
      - GROQ_API_KEY
      - OPENROUTER_API_KEY
